name: Share
options:
  bundleIdPrefix: dev.eythorsson
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Share:
    type: application
    platform: [iOS, macOS]
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - path: Share/App
    resources:
      - path: Share/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.eythorsson.share
        PRODUCT_NAME: Share
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Share
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CODE_SIGN_ENTITLEMENTS: Share.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
    entitlements:
      path: Share.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.dev.eythorsson.share
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.security.application-groups:
          - group.dev.eythorsson.share
    dependencies:
      - target: ShareExtension
        platforms: [iOS]
        embed: true

  ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Share/ShareExtension
        excludes:
          - "Info.plist"
    info:
      path: Share/ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Share Extension
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.eythorsson.share.ShareExtension
        PRODUCT_NAME: ShareExtension
        CODE_SIGN_ENTITLEMENTS: ShareExtension.entitlements
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
    entitlements:
      path: ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.dev.eythorsson.share

schemes:
  Share-iOS:
    build:
      targets:
        Share_iOS: all
        ShareExtension: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  Share-macOS:
    build:
      targets:
        Share_macOS: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
